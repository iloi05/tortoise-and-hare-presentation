<!DOCTYPE html>
<html>
<body>
<canvas id="canvas" width="700" height="250"></canvas>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    const steps = [
        {slow: 'A', fast: 'A'},
        {slow: 'B', fast: 'C'},
        {slow: 'C', fast: 'B'},
        {slow: 'D', fast: 'D'},

        {slow: 'E', fast: 'E'},
        {slow: 'F', fast: 'G'},
        {slow: 'G', fast: 'H'},
    ];

    const positions = {
        'A':[100,120],
        'B':[200,120],
        'C':[300,120],
        'D':[400,120],
        'E':[100,200],
        'F':[200,200],
        'G':[300,200],
        'H':[400,200],
    };

    const edges = [ 
        ['A', 'B'],
        ['B', 'C'],
        ['C', 'D'],
        ['D', 'B'], // Cycle
        ['E', 'F'],
        ['F', 'G'],
        ['G', 'H'],
    ];

    let i = 0;

    function drawArrow(x1, y1, x2, y2) {
        ctx.strokeStyle = 'black';
        ctx.fillStyle = 'black';
        ctx.lineWidth = 2;
        const headlen = 10; // length of head in pixels
        const dx = x2 - x1;
        const dy = y2 - y1;
        const angle = Math.atan2(dy, dx);

        const r = 25;

        const startX = x1 + r * Math.cos(angle);
        const startY = y1 + r * Math.sin(angle);
        const endX = x2 - r * Math.cos(angle);
        const endY = y2 - r * Math.sin(angle);

        ctx.beginPath();
        ctx.moveTo(startX, startY);
        ctx.lineTo(endX, endY);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(endX, endY);
        ctx.lineTo(
            endX - headlen * Math.cos(angle - Math.PI / 6), 
            endY - headlen * Math.sin(angle - Math.PI / 6)
        );
        ctx.lineTo(
            endX - headlen * Math.cos(angle + Math.PI / 6), 
            endY - headlen * Math.sin(angle + Math.PI / 6)
        );
        ctx.lineTo(endX, endY);
        ctx.fill();
    }

    function drawCurvedArrow(x1, y1, x2, y2) {
        const headlen = 10; // length of head in pixels
        const mX = (x1 + x2) / 2;
        const mY = (y1 + y2) / 2;

        const curveHeight = 80;

        const cpX = mX;
        const cpY = mY - curveHeight;

        ctx.strokeStyle = 'black';
        ctx.fillStyle = 'black';
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.quadraticCurveTo(cpX, cpY, x2, y2);
        ctx.stroke();

        const angle = Math.atan2(y2 - cpY, x2 - cpX);

        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(
            x2 - headlen * Math.cos(angle - Math.PI / 6), 
            y2 - headlen * Math.sin(angle - Math.PI / 6)
        );
        ctx.lineTo(
            x2 - headlen * Math.cos(angle + Math.PI / 6), 
            y2 - headlen * Math.sin(angle + Math.PI / 6)
        );
        ctx.lineTo(x2, y2);
        ctx.fill();
    }

    function legend() {
        ctx.fillStyle = 'blue';
        ctx.beginPath();
        ctx.arc(550, 40, 8, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillStyle = 'black';
        ctx.fillText('Slow Pointer', 565, 45);

        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(550, 70, 8, 0, 2 * Math.PI);
        ctx.fill();
        ctx.fillText('Fast Pointer', 565, 75);
    }

    function draw(step) {
        ctx.clearRect(0,0,700,250);

        for (let [start, end] of edges) {
            let [x1, y1] = positions[start];
            let [x2, y2] = positions[end];
            
            if (start === 'D' && end === 'B') {
                drawCurvedArrow(x1, y1, x2, y2);
            } else {
                drawArrow(x1, y1, x2, y2);
            }
        }


        for (let key in positions) {
            let [x,y] = positions[key];

            ctx.beginPath();
            ctx.arc(x,y,25,0,2*Math.PI);

            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 1;

            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = 'black';
            ctx.fillText(key, x-5, y+5);
        }

        let [sx, sy] = positions[step.slow];
        ctx.fillStyle = 'blue';
        ctx.beginPath();
        ctx.arc(sx,sy,10,0,2*Math.PI);
        ctx.fill();

        let [fx, fy] = positions[step.fast];
        ctx.fillStyle = 'red';
        ctx.beginPath();
        ctx.arc(fx,fy,10,0,2*Math.PI);
        ctx.fill();

        legend();
    }

    const startStep = {slow: 'A', fast: 'A'};
    draw(startStep);

    function animate() {
        draw(steps[i]);
        i = (i + 1) % steps.length;
        setTimeout(animate, 1000);
    }
    animate();
</script>

</body>
</html>
